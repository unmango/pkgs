name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.targets.outputs.packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - id: all
        run: |
          all=$(./scripts/list-build-targets.sh | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=$all" >> "$GITHUB_OUTPUT"

      # A change outside pkgs/** (flake.nix, flake.lock, lib/**, pkgs/default.nix, ...)
      # can affect any package, so fall back to building everything.
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          predicate-quantifier: every
          list-files: json
          filters: |
            pkgs:
              - 'pkgs/**'

      - id: targets
        env:
          ALL_PACKAGES: ${{ steps.all.outputs.packages }}
          ONLY_PKGS: ${{ steps.filter.outputs.pkgs }}
          CHANGED_FILES: ${{ steps.filter.outputs.pkgs_files }}
        run: |
          if [ "$ONLY_PKGS" != "true" ]; then
            echo "packages=$ALL_PACKAGES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_targets=$(echo "$CHANGED_FILES" | jq -r '.[]' | awk -F/ '
            /^pkgs\/images\// { print $3 ".image"; next }
            /^pkgs\// { print $2 }
          ' | sort -u)

          changed_json=$(echo "$changed_targets" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          filtered=$(jq -nc --argjson all "$ALL_PACKAGES" --argjson changed "$changed_json" \
            '$all | map(select(. as $p | $changed | index($p) != null))')

          echo "packages=$filtered" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    if: needs.matrix.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: unstoppablemango

      - run: nix build --no-link .#${{ matrix.package }}

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: unstoppablemango

      - run: nix flake check

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: unstoppablemango

      - run: nix develop -c make generate
      - run: git diff --exit-code
